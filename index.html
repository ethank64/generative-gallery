<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ethan Knotts — Generative Gallery</title>
  <meta name="description" content="A gallery of algorithmic art — living p5.js sketches you can run, reseed, and reshape in the browser.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/gallery.css">
</head>
<body>
  <div class="room"></div>

  <div class="wrap">

    <header class="topbar">
      <a class="brand" href="index.html">
        <span class="name">ETHAN&nbsp;KNOTTS</span>
      </a>
      <nav class="nav">
        <a href="#works">Works</a>
        <a href="about.html">About</a>
        <a href="https://github.com/ethank64/generative-gallery">GitHub <span aria-hidden="true">↗</span></a>
      </nav>
    </header>

    <section class="hero">
      <h1>Generative<br>gallery</h1>
      <p>Each piece is a living p5.js sketch you can run, reseed, and reshape in the browser.</p>
      <div class="stats">
        <span id="work-count">1 work</span>
        <span class="sep">·</span>
        <span>p5.js · seeded &amp; reproducible</span>
        <span class="sep">·</span>
      </div>
    </section>

    <main id="works">
      <div id="featured"></div>

      <div class="section-label">
        <h2>Works</h2>
        <span class="count" id="grid-count"></span>
      </div>

      <div class="chips" id="chips"></div>
      <div class="grid" id="grid"></div>
    </main>

    <footer class="foot">
      <span>Built with <a class="foot-inline" href="https://p5js.org">p5.js</a></span>
      <a href="https://github.com/ethank64/generative-gallery">github.com/ethank64/generative-gallery <span aria-hidden="true">↗</span></a>
    </footer>

  </div>

  <script src="works/works.js"></script>
  <script src="assets/thumbs.js"></script>
  <script src="assets/gallery.js"></script>
</body>
</html>
